<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Financinhas – Missão dos Sonhos</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>💰 Financinhas – Missão dos Sonhos</h1>

<div id="login">

<h2>Entrar</h2>

<input id="login-email" placeholder="Email">

<input id="login-pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p>
Não tem conta?
<a href="#" onclick="mostrarCadastro()">Cadastrar</a>
</p>

</div>


<div id="cadastro" style="display:none">

<h2>Criar conta</h2>

<input id="reg-nome" placeholder="Nome da criança">

<input id="reg-email" placeholder="Email">

<input id="reg-pass" type="password" placeholder="Senha">

<button onclick="cadastrar()">Criar conta</button>

</div>


<div id="avatar" style="display:none">

<h2>Escolha seu personagem</h2>

<button onclick="escolher('Bia')">👧 Bia</button>

<button onclick="escolher('Caio')">👦 Caio</button>

<button onclick="escolher('Lila')">👧 Lila</button>

<button onclick="escolher('Nico')">👦 Nico</button>

</div>


<div id="cidade" style="display:none">

<h2>🏙️ Cidade Financinhas</h2>

<p id="player"></p>

<p>Moedas: <span id="moedas">0</span></p>

<button onclick="missao()">Ir para missão</button>

</div>


<div id="missao" style="display:none">

<h2>Missão</h2>

<p id="pergunta"></p>

<button onclick="responder(0)" id="a0"></button>

<button onclick="responder(1)" id="a1"></button>

</div>


<script src="js/game.js"></script>

</body>

</html>
