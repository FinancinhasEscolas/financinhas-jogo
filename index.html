<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Financinhas Jogo</title>

<style>

body{
font-family:Arial;
background:#f3f4ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#6a1b9a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4a148c;
}

.link{
margin-top:10px;
color:#555;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="login">

<h2>🎮 Financinhas</h2>

<input type="email" placeholder="Email do responsável">

<input type="password" placeholder="Senha">

<button onclick="login()">Jogar</button>

<p class="link" onclick="mostrarCadastro()">Ainda não tem conta? Cadastrar</p>

</div>

<!-- CADASTRO -->
<div id="cadastro" class="hidden">

<h2>Criar conta</h2>

<input id="nome" placeholder="Nome do aluno">

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="cadastrar()">Criar conta</button>

<p class="link" onclick="voltarLogin()">Voltar</p>

</div>

</div>

<script>

function mostrarCadastro(){
document.getElementById("login").classList.add("hidden")
document.getElementById("cadastro").classList.remove("hidden")
}

function voltarLogin(){
document.getElementById("cadastro").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")
}

function cadastrar(){

let nome=document.getElementById("nome").value

if(nome==""){
alert("Digite o nome do aluno")
return
}

alert("Cadastro realizado!")

voltarLogin()

}

function login(){
alert("Login feito! Em breve começa o jogo 🎮")
}

</script>

</body>
</html>
