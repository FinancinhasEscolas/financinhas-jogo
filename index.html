<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Financinhas - Jogo</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#7b2cbf;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5a189a;
}

.link{
margin-top:10px;
cursor:pointer;
color:#555;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">

<h2>🎮 Financinhas</h2>

<input type="email" placeholder="E-mail do responsável">

<input type="password" placeholder="Senha">

<button onclick="jogar()">Jogar!</button>

<p class="link" onclick="mostrarCadastro()">Ainda não tem conta? Cadastrar</p>

</div>

<!-- CADASTRO -->
<div id="cadastro" class="hidden">

<h2>Criar Conta</h2>

<input id="nome" placeholder="Nome do aluno">

<input id="email" placeholder="E-mail do responsável">

<input id="senha" type="password" placeholder="Senha">

<button onclick="cadastrar()">Criar Conta</button>

<p class="link" onclick="voltarLogin()">Voltar</p>

</div>

</div>

<script>

function mostrarCadastro(){
document.getElementById("login").classList.add("hidden")
document.getElementById("cadastro").classList.remove("hidden")
}

function voltarLogin(){
document.getElementById("cadastro").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")
}

function cadastrar(){

let nome=document.getElementById("nome").value
let email=document.getElementById("email").value

if(nome=="" || email==""){
alert("Preencha os campos")
return
}

alert("Conta criada com sucesso!")

voltarLogin()

}

function jogar(){
alert("Login realizado! Em breve o jogo começa 🎮")
}

</script>

</body>
</html>
